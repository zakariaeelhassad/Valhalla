name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Build (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: angular-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: angular-frontend/dist/angular-frontend
          if-no-files-found: error

  backend:
    name: Backend Build (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend
        run: mvn -B -f backend/pom.xml clean verify -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: |
            backend/target/*.jar
            !backend/target/*.jar.original
          if-no-files-found: error

  backend-docker:
    name: Backend Docker Validation
    runs-on: ubuntu-latest
    needs:
      - backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for Docker validation
        run: |
          cd backend
          cat > .env << EOF
          DB_URL=jdbc:postgresql://postgres:5432/aji_t9aser_db
          DB_USERNAME=postgres
          DB_PASSWORD=postgres
          POSTGRES_DB=aji_t9aser_db
          SERVER_PORT=8080
          JWT_SECRET=test-secret-key-for-ci-cd
          JWT_EXPIRATION=86400000
          OPENAI_API_KEY=test-key
          EOF

      - name: Validate docker-compose file
        run: docker compose -f backend/docker-compose.yml config

      - name: Build backend Docker image
        run: docker build -t valhalla-backend:ci backend

  delivery:
    name: Delivery Stage
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - backend-docker
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/backend

      - name: Delivery summary
        run: |
          echo "Frontend and backend artifacts are ready for deployment."
          echo "Configure your host-specific deployment step here (for example VPS, Render, Railway, or Azure)."
