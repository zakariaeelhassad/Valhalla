# Application Configuration
spring:
  application:
    name: backend
  
  # PostgreSQL Database Configuration (loaded from .env file)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aji_t9aser_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  
  # Spring AI Configuration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.8
          max-tokens: 100
  
  # Task Scheduling Configuration
  task:
    scheduling:
      pool:
        size: 2

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# JWT Security Configuration
jwt:
  secret: ${JWT_SECRET:YourSuperSecretJWTKeyThatShouldBeAtLeast256BitsLongForHS256Algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
