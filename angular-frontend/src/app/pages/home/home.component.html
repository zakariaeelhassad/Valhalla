
  <div class="min-h-screen flex flex-col" style="background:#070b14">
    <app-navbar />

    <app-home-hero
      [isAuthenticated]="auth.isAuthenticated()"
      [currentGameweek]="gameState?.currentGameweek || 38">
    </app-home-hero>

    <app-home-features
      [features]="features"
      [iconBg]="iconBg"
      [iconBorder]="iconBorder"
      [featureBar]="featureBar">
    </app-home-features>

    <hr class="border-white/[0.06] mx-6"/>

    <app-home-about
      [isAuthenticated]="auth.isAuthenticated()"
      [scoring]="scoring">
    </app-home-about>

    <hr class="border-white/[0.06] mx-6"/>

    @if (!auth.isAuthenticated()) {
      <app-home-cta></app-home-cta>
    }

    <app-footer />
  </div>
