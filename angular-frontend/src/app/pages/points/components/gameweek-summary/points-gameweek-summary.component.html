<div
  *ngIf="shouldShow"
  class="glass-card p-6 py-8 flex flex-col items-center relative overflow-hidden"
  style="background: rgba(30, 10, 48, 0.4);"
>
  <h2 class="text-2xl font-black text-slate-100 mb-8 mt-1 flex items-center gap-4">
    <button
      (click)="changeGameweek(-1)"
      [disabled]="viewedGameweek <= 1"
      class="w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center cursor-pointer hover:bg-purple-500/40 text-sm font-bold text-slate-300 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
    >&lt;</button>
    Gameweek {{ viewedGameweek || 1 }}
    <button
      (click)="changeGameweek(1)"
      [disabled]="viewedGameweek >= 38"
      class="w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center cursor-pointer hover:bg-purple-500/40 text-sm font-bold text-slate-300 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
    >&gt;</button>
  </h2>

  <div class="flex items-center justify-center gap-12 sm:gap-16 w-full max-w-3xl flex-wrap">
    <div class="flex flex-col items-center relative">
      <span class="font-outfit font-black text-3xl text-slate-100 flex items-start gap-1">
        {{ highestPoints }} <span class="text-sm mt-1">→</span>
      </span>
      <span class="text-[10px] uppercase text-slate-400 mt-1 tracking-widest font-bold">Highest Points</span>
    </div>

    <div
      class="bg-teal-400 text-slate-900 rounded-xl p-4 px-8 flex flex-col items-center justify-center shadow-[0_0_30px_rgba(45,212,191,0.3)] transform scale-110 mx-4"
    >
      <span class="font-outfit font-black text-5xl leading-none text-slate-900 shadow-sm">{{ gwPoints }}</span>
      <span class="text-[10px] uppercase mt-2 tracking-widest font-bold opacity-80 text-slate-900">Total Points</span>
    </div>
  </div>
</div>
